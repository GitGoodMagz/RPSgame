<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ROCK - PAPER - SCISSOR</title>
    <meta name="theme-color" content="#0b4fa8" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./app.css" />
    <link rel="icon" href="./icons/icon-192.png" />
  </head>
  <body>
    <main class="wrap">
      <header class="top">
        <div class="topSpacer" aria-hidden="true"></div>

        <div class="brand">
          <h1>ROCK - PAPER - SCISSOR</h1>
        </div>

        <div id="shellPanel" class="shellPanel hidden">
          <div id="shellUser" class="headerUser"></div>
          <div class="shellActions">
            <button id="accountManageButton" type="button" class="hidden">
              Manage account
            </button>
            <button id="accountLogoutButton" type="button">Log out</button>
          </div>
        </div>
      </header>

      <section
        class="card"
        data-view="create"
        aria-labelledby="createViewHeading"
      >
        <h2 id="createViewHeading">Log in or create account</h2>
        <user-create></user-create>
      </section>

      <section
        class="card hidden"
        data-view="manage"
        aria-labelledby="manageViewHeading"
        aria-hidden="true"
      >
        <h2 id="manageViewHeading" class="srOnly">Manage account</h2>
        <user-manage></user-manage>
      </section>
    </main>

    <dialog id="legalDialog" class="dialog" aria-labelledby="legalTitle">
      <form method="dialog" class="dialogInner">
        <div class="dialogTop">
          <h2 class="dialogTitle" id="legalTitle">Terms</h2>
          <div class="dialogTabs">
            <button type="button" class="tabBtn" data-doc="tos">Terms</button>
            <button type="button" class="tabBtn" data-doc="privacy">
              Privacy Policy
            </button>
          </div>
        </div>

        <div class="dialogFrameWrap">
          <iframe
            id="legalFrame"
            class="dialogFrame"
            title="Legal document"
            src="./ToS.html"
          ></iframe>
        </div>

        <div class="dialogActions">
          <button type="submit">Close</button>
        </div>
      </form>
    </dialog>

    <template id="createUserTemplate">
      <div class="row">
        <section class="subcard" data-field="modePicker">
          <div class="row">
            <button data-field="showRegisterButton" type="button">
              Create account
            </button>
            <button data-field="showLoginButton" type="button">Log in</button>
          </div>
        </section>

        <section class="subcard hidden" data-field="registerSection">
          <div class="toolbar">
            <h3 data-field="registerHeading">Create account</h3>
            <button data-field="registerBackButton" type="button" class="tab">
              Back
            </button>
          </div>

          <div class="row">
            <label
              class="srOnly"
              data-field="registerUsernameLabel"
              for="registerUsernameInput"
              >Username</label
            >
            <input
              id="registerUsernameInput"
              data-field="registerUsernameInput"
              placeholder="username"
              autocomplete="username"
            />

            <label
              class="srOnly"
              data-field="registerPasswordLabel"
              for="registerPasswordInput"
              >Password</label
            >
            <input
              id="registerPasswordInput"
              data-field="registerPasswordInput"
              placeholder="password"
              type="password"
              autocomplete="new-password"
            />

            <label class="small line">
              <span class="legalLine">
                <span data-field="tosPrefix">I accept</span>
                <button type="button" class="link" data-field="openTerms">
                  Terms
                </button>
                <span data-field="tosMiddle">and acknowledge</span>
                <button type="button" class="link" data-field="openPrivacy">
                  Privacy Policy
                </button>
              </span>
              <input data-field="termsCheckbox" type="checkbox" />
            </label>

            <button data-field="registerButton" type="button">
              Create account
            </button>
            <div
              class="small"
              data-field="registerHint"
              role="status"
              aria-live="polite"
            ></div>
          </div>
        </section>

        <section class="subcard hidden" data-field="loginSection">
          <div class="toolbar">
            <h3 data-field="loginHeading">Log in</h3>
            <button data-field="loginBackButton" type="button" class="tab">
              Back
            </button>
          </div>

          <div class="row">
            <label
              class="srOnly"
              data-field="loginUsernameLabel"
              for="loginUsernameInput"
              >Username</label
            >
            <input
              id="loginUsernameInput"
              data-field="loginUsernameInput"
              placeholder="username"
              autocomplete="username"
            />

            <label
              class="srOnly"
              data-field="loginPasswordLabel"
              for="loginPasswordInput"
              >Password</label
            >
            <input
              id="loginPasswordInput"
              data-field="loginPasswordInput"
              placeholder="password"
              type="password"
              autocomplete="current-password"
            />

            <button data-field="loginButton" type="button">Log in</button>
            <div
              class="small"
              data-field="loginHint"
              role="status"
              aria-live="polite"
            ></div>
          </div>
        </section>
      </div>
    </template>

    <template id="manageTemplate">
      <div class="row">
        <section data-field="emptyState" class="empty hidden">
          <div class="small" data-field="emptyText">No users available.</div>
          <button data-field="goCreateButton" type="button">
            Go to log in
          </button>
        </section>

        <section data-field="contentState" class="hidden">
          <div class="list" data-field="userList"></div>

          <div class="split">
            <section class="subcard hidden" data-field="editCard">
              <h3 data-field="editHeading">Change password</h3>
              <div class="row">
                <div class="small" data-field="selectedUserLabel">
                  Selected: none
                </div>
                <label
                  class="srOnly"
                  data-field="newPasswordLabel"
                  for="manageNewPasswordInput"
                  >New password</label
                >
                <input
                  id="manageNewPasswordInput"
                  data-field="newPasswordInput"
                  placeholder="new password"
                  type="password"
                  autocomplete="new-password"
                />
                <button data-field="saveButton" type="button">
                  Save changes
                </button>
              </div>
            </section>

            <section class="subcard hidden" data-field="deleteCard">
              <h3 data-field="deleteHeading">Delete account</h3>
              <div class="row">
                <div class="small" data-field="selectedUserLabel2">
                  Selected: none
                </div>
                <button data-field="deleteButton" type="button">
                  Delete selected user
                </button>
              </div>
            </section>
          </div>
        </section>
      </div>
    </template>

    <script type="module" src="app.mjs"></script>
  </body>
</html>
