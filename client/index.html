<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RPSgame</title>
    <meta name="theme-color" content="#0b4fa8" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./app.css" />
    <link rel="icon" href="./icons/icon-192.png" />
  </head>
  <body>
    <main class="wrap" id="mainContent">
      <header class="top">
        <div class="brand">
          <h1 data-i18n="app.title">RPSgame</h1>
        </div>
        <nav class="nav" aria-label="Main navigation" data-i18n-aria-label="shell.navLabel">
          <button type="button" data-nav="create" class="tab active" data-i18n="shell.createTab">Create user</button>
          <button type="button" data-nav="manage" class="tab" disabled data-i18n="shell.manageTab">Manage users</button>
        </nav>
      </header>

      <section class="card" data-view="create" aria-labelledby="createViewHeading">
        <h2 id="createViewHeading" data-i18n="shell.createHeading">Create user</h2>
        <user-create></user-create>
      </section>

      <section class="card hidden" data-view="manage" aria-labelledby="manageViewHeading" aria-hidden="true">
        <h2 id="manageViewHeading" data-i18n="shell.manageHeading">Manage users</h2>
        <user-manage></user-manage>
      </section>
    </main>

    <dialog id="legalDialog" class="dialog" aria-labelledby="legalTitle">
      <form method="dialog" class="dialogInner">
        <div class="dialogTop">
          <h2 class="dialogTitle" id="legalTitle" data-i18n="shell.legalTitleTerms">Terms</h2>
          <div class="dialogTabs">
            <button type="button" class="tabBtn" data-doc="tos" data-i18n="shell.terms">Terms</button>
            <button type="button" class="tabBtn" data-doc="privacy" data-i18n="shell.privacy">Privacy Policy</button>
          </div>
        </div>

        <div class="dialogFrameWrap">
          <iframe id="legalFrame" class="dialogFrame" title="Legal document" src="./ToS.html"></iframe>
        </div>

        <div class="dialogActions">
          <button type="submit" data-i18n="shell.close">Close</button>
        </div>
      </form>
    </dialog>

    <template id="createUserTemplate">
      <div class="row">
        <label class="srOnly" data-field="usernameLabel" for="createUsernameInput">Username</label>
        <input id="createUsernameInput" data-field="usernameInput" placeholder="username" autocomplete="username" />

        <label class="srOnly" data-field="passwordLabel" for="createPasswordInput">Password</label>
        <input id="createPasswordInput" data-field="passwordInput" placeholder="password" type="password" autocomplete="new-password" />

        <label class="small line">
          <span class="legalLine">
            <span data-field="tosPrefix">I accept</span>
            <button type="button" class="link" data-field="openTerms">Terms</button>
            <span data-field="tosMiddle">and acknowledge</span>
            <button type="button" class="link" data-field="openPrivacy">Privacy Policy</button>
          </span>
          <input data-field="termsCheckbox" type="checkbox" />
        </label>

        <button data-field="createButton" type="button">Create user</button>
        <div class="small" data-field="createHint" role="status" aria-live="polite"></div>
      </div>
    </template>

    <template id="manageTemplate">
      <div class="row">
        <div class="toolbar">
          <button data-field="refreshButton" type="button">Refresh</button>
          <div class="small" data-field="helpText" role="status" aria-live="polite"></div>
        </div>

        <section data-field="emptyState" class="empty hidden">
          <div class="small" data-field="emptyText">No users yet.</div>
          <button data-field="goCreateButton" type="button">Go create a user</button>
        </section>

        <section data-field="contentState" class="hidden">
          <div class="list" data-field="userList"></div>

          <div class="split">
            <section class="subcard hidden" data-field="editCard">
              <h3 data-field="editHeading">Edit</h3>
              <div class="row">
                <div class="small" data-field="selectedUserLabel">Selected: none</div>
                <label class="srOnly" data-field="newPasswordLabel" for="manageNewPasswordInput">New password</label>
                <input id="manageNewPasswordInput" data-field="newPasswordInput" placeholder="new password (optional)" type="password" autocomplete="new-password" />
                <button data-field="saveButton" type="button">Save changes</button>
              </div>
            </section>

            <section class="subcard hidden" data-field="deleteCard">
              <h3 data-field="deleteHeading">Delete</h3>
              <div class="row">
                <div class="small" data-field="selectedUserLabel2">Selected: none</div>
                <button data-field="deleteButton" type="button">Delete selected user</button>
              </div>
            </section>
          </div>
        </section>
      </div>
    </template>

    <script type="module" src="./app.mjs"></script>
  </body>
</html>
